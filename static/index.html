<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italian Anki Generator</title>
    <link rel="stylesheet" href="styles.css?v=12">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Vazirmatn:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <a href="/settings" class="settings-corner-btn" style="text-decoration: none;" title="Anki Settings">⚙️ Settings</a>
    <div class="container" style="position: relative;">
        <header>
            <div class="flag-wrapper" style="position: relative; display: inline-block;">
                <div id="flagBanner" class="flag-banner bounce-anim" style="cursor: pointer; position: relative;">
                    <img id="flagImage" src="https://flagcdn.com/w160/it.png" class="waving-flag" alt="Italian Flag">
                    <span id="flagText">Italian</span>
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div id="languageDropdown" class="custom-dropdown hidden">
                    <div class="dropdown-item" data-lang="Italian">🇮🇹 Italian</div>
                    <div class="dropdown-item" data-lang="Spanish">🇪🇸 Spanish</div>
                    <div class="dropdown-item" data-lang="French">🇫🇷 French</div>
                    <div class="dropdown-item" data-lang="German">🇩🇪 German</div>
                    <div class="dropdown-item" data-lang="Japanese">🇯🇵 Japanese</div>
                </div>
            </div>
            <div id="mainConnectionStatus" class="blink-status hidden" style="color: #34a853; font-size: 14px; font-weight: bold; margin-bottom: 8px;">✅ Connected</div>
            <div class="header-title-row">
                <h1 id="mainTitle">Italian Anki Generator</h1>
                <div class="status-indicator" id="ankiStatus" title="Checking Anki status..."></div>
            </div>
            <p>Generate vocabulary and conjugations with audio</p>
        </header>
        


        <div class="input-section minimal-panel">
            <form id="wordForm">
                <input type="text" id="wordInput" placeholder="Enter an Italian word or English phrase..." required autocomplete="off">
                <button type="submit" id="generateBtn">
                    <span class="btn-text">Generate Card</span>
                </button>
            </form>
            <div id="progressContainer" class="progress-container hidden">
                <div class="activity-header">
                    <div class="pulse-dot"></div>
                    <span>Live Generation Status</span>
                </div>
                <div id="activityLog" class="activity-log">
                    <!-- Streamed status updates will go here -->
                </div>
            </div>
            <div id="statusMessage" class="hidden"></div>
        </div>

        <div class="preview-section hidden" id="previewSection">
            <h2>Card Preview</h2>
            <div class="card-container">
                <div class="card-side minimal-panel" id="frontPreview">
                    <div class="side-label">Front</div>
                    <div class="html-content" id="frontHtml"></div>
                    <div class="audio-controls" id="frontAudioControls"></div>
                </div>
                <div class="card-side minimal-panel" id="backPreview">
                    <div class="side-label">Back</div>
                    <div class="html-content" id="backHtml"></div>
                    <div class="audio-controls" id="backAudioControls"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=23"></script>
</body>
</html>
